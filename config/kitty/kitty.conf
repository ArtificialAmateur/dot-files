# vim:fileencoding=utf-8:foldmethod=marker

# Fonts {{{

font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0
disable_ligatures cursor

# }}}

# Cursor {{{

cursor_shape block
cursor_blink_interval 0

# }}}

# Scrollback {{{

scrollback_lines -1
scrollback_pager ~/.config/kitty/scrollback-pager.sh

# }}}

# Mouse {{{

copy_on_select clipboard
mouse_hide_wait 3.0
url_style curly
open_url_with default

# }}}

# Bell {{{

enable_audio_bell no
visual_bell_duration 0

# }}}

# Window {{{

hide_window_decorations yes
confirm_os_window_close -1
enabled_layouts splits,tall,fat,stack
background_opacity 0.95
background_blur 20

# }}}

# Tab bar {{{

tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# }}}

# Shell integration {{{

shell_integration enabled
allow_hyperlinks yes

# }}}

# Remote control {{{

allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# }}}

# Keybindings {{{

# Splits
map ctrl+shift+enter launch --cwd=current --location=split
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+r start_resizing_window

# Toggle zoom/stack on current split
map ctrl+shift+z toggle_layout stack

# Scrollback
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
map ctrl+shift+u scroll_page_up
map ctrl+shift+d scroll_page_down

# }}}

# Theme {{{

include gruvbox-dark-hard.conf

# }}}
